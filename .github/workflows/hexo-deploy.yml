# GitHub Actions 自动部署 Hexo 到 GitHub Pages
# 触发条件：push 到 main 分支，或手动触发

name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main          # main 分支推送时自动部署
  workflow_dispatch:    # 支持在 Actions 页面手动触发

# 权限声明（Pages 部署需要这些权限）
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行
concurrency:
  group: "pages"
  cancel-in-progress: false

# 默认工作目录（Hexo 项目在 blog/ 子目录）
defaults:
  run:
    working-directory: blog

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码（含子模块，如 themes/butterfly 如果用 git submodule 安装）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # 配置 Node.js 20 并启用 npm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 安装依赖（npm ci 比 npm install 更快更严格）
      - name: Install dependencies
        run: npm ci

      # 构建静态文件到 public/ 目录
      - name: Build Hexo
        run: npx hexo generate

      # 上传 public/ 为 GitHub Pages 部署产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./blog/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build      # 等 build 完成后再部署
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
