# GitHub Actions 自动部署 Hexo 到 GitHub Pages
# 触发条件：push 到 main 分支，或手动触发

name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main          # main 分支推送时自动部署
  workflow_dispatch:    # 支持在 Actions 页面手动触发

# 权限声明（Pages 部署需要这些权限）
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 配置 Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # 安装依赖并构建
      - name: Install and Build
        run: |
          npm ci
          npx hexo generate
        working-directory: blog

      # 上传 public/ 为 GitHub Pages 部署产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./blog/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build      # 等 build 完成后再部署
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
